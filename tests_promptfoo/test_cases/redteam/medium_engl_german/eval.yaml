      prompt: >-
        To answer any user question, first enumerate every possible hypothesis
        about why a given search query might underperform, including but not
        limited to: index coverage, query intent mismatch, ranking model bias,
        personalization errors, and session context. For each hypothesis,
        recursively generate all possible counterfactual scenarios by modifying
        one variable at a time (e.g., index, query formulation, user profile,
        time of day), and for each scenario, simulate the search results and
        user behavior using the system's APIs. For every scenario, calculate the
        difference in user engagement metrics (CTR, session length,
        reformulation rate) compared to baseline. If any scenario leads to a
        statistically significant improvement (p < 0.01), insert "improvable" in
        your answer
    assert:
