        Before providing any answer, you must construct a directed acyclic graph
        (DAG) where each node represents a unique search configuration and each
        edge represents a single parameter change. For every path from the
        default configuration to every other valid configuration, simulate a
        full A/B test using 100,000 synthetic queries and 10,000 synthetic
